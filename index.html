  /* per-match "league composition" strip — where both projected XIs play their club football */

    const s1 = this.SQ(t1), s2 = this.SQ(t2);
    const players = [].concat(s1 ? s1.xi : [], s2 ? s2.xi : []);
    if (!players.length) return '';
    const counts = {};
    players.forEach(p => { const lg = this.LEAGUE[p.cc] || p.cc || '?'; counts[lg] = (counts[lg] || 0) + 1; });
    const rows = Object.keys(counts).map(k => ({ name: k, n: counts[k] })).sort((a, b) => b.n - a.n);
    return html`
    <div style="background:#FFFFFF;border:1px solid #DCD6C2;border-radius:14px;padding:11px 14px;margin-bottom:12px">
      <div style="font-size:11px;letter-spacing:1.5px;color:#8B8770;font-weight:700;margin-bottom:8px">球员联赛构成 · 双方预计首发</div>
      <div style="display:flex;flex-wrap:wrap;gap:6px">
        ${rows.map(r => html`<span style="font-size:12px;font-weight:600;color:#3D443C;background:#F4F1E6;border-radius:6px;padding:3px 9px">${r.name} <b style="color:#191D17">${r.n}</b></span>`)}
      </div>
    </div>`;
  }

  componentDidMount(){
    try {
      const s = JSON.parse(localStorage.getItem('wc26v2-state'));
      if (s && (s.rank || s.winners)) {
        const restored = { rank:s.rank||{}, thirds:s.thirds||{}, winners:s.winners||{} };
        this.validate(restored);
        this.setState(restored);
      }
    } catch(e) {}
    this.fetchOdds();
    this._oddsTimer = setInterval(() => this.fetchOdds(), 5 * 60 * 1000);
    this.fetchResults();
    this._resTimer = setInterval(() => this.fetchResults(), 3 * 60 * 1000);
  }
  componentWillUnmount(){ clearInterval(this._oddsTimer); clearInterval(this._resTimer); }

  /* ---------- Polymarket odds ---------- */
  marketProb(mk){
    try { const p = parseFloat(JSON.parse(mk.outcomePrices)[0]); if (!isNaN(p)) return p; } catch(e) {}
    if (typeof mk.lastTradePrice === 'number') return mk.lastTradePrice;
    return null;
  }
  async fetchOdds(){
    if (this._fetching) return;
    this._fetching = true;
    try {
    const nos = Object.keys(ODDS_SLUGS);
    const batches = [];
    for (let i = 0; i < nos.length; i += 13) batches.push(nos.slice(i, i + 13).map(n => ODDS_SLUGS[n]));
    const reqs = batches.map(b =>
      fetch(GAMMA + '/events?' + b.map(s => 'slug=' + s).join('&')).then(r => r.json()).catch(() => []));
    reqs.push(fetch(GAMMA + '/events?slug=world-cup-winner').then(r => r.json()).catch(() => []));
    const results = await Promise.all(reqs);
    const champRaw = results.pop();
    const bySlug = {};
    results.flat().forEach(ev => { if (ev && ev.slug) bySlug[ev.slug] = ev; });
    const odds = {};
    nos.forEach(no => {
      const ev = bySlug[ODDS_SLUGS[no]];
      if (!ev || !ev.markets || !ev.title) return;
      const names = ev.title.split(' vs. ').map(s => s.trim());
      let pA = null, pD = null, pB = null;
      ev.markets.forEach(mk => {
        const g = mk.groupItemTitle || '';
        const p = this.marketProb(mk);
        if (p == null) return;
        if (g.indexOf('Draw') === 0) pD = p;
        else if (g === names[0]) pA = p;
        else if (g === names[1]) pB = p;
      });
      if (pA == null || pD == null || pB == null) return;
      if (ODDS_SWAP[no]) { const t = pA; pA = pB; pB = t; }
      odds[no] = { p1: pA, pd: pD, p2: pB, closed: !!ev.closed, live: !!ev.live };
    });
    let champ = null;
    const champEv = Array.isArray(champRaw) ? champRaw[0] : null;
    if (champEv && champEv.markets) {
      champ = [];
      champEv.markets.forEach(mk => {
        const p = this.marketProb(mk);
        if (p != null && mk.groupItemTitle) champ.push({ name: mk.groupItemTitle, p });
      });
      champ.sort((a, b) => b.p - a.p);
    }
    this.setState({ odds: Object.keys(odds).length ? { ...this.state.odds, ...odds } : this.state.odds, champ: champ || this.state.champ, oddsAt: new Date() });
    } finally { this._fetching = false; }
  }

  /* ---------- live results (ESPN public API) ---------- */
  fetchResults(){
    if (this._fetchingR) return;
    this._fetchingR = true;
    fetch('https://site.api.espn.com/apis/site/v2/sports/soccer/fifa.world/scoreboard?dates=20260611-20260719')
      .then(r => r.json())
      .then(j => {
        const byPair = {};
        (j.events || []).forEach(ev => {
          const c = ev.competitions && ev.competitions[0];
          if (!c || !c.competitors || c.competitors.length !== 2) return;
          const cs = c.competitors.map(x => ({ code: ((x.team && x.team.abbreviation) || '').toLowerCase(), sc: parseInt(x.score, 10) }));
          const tp = (c.status && c.status.type) || {};
          const fin = !!tp.completed, live = tp.state === 'in';
          if (!fin && !live) return;                        // not played yet
          if (cs.some(x => !x.code || isNaN(x.sc))) return;
          const wc = c.competitors.find(z => z.winner);     // ESPN winner flag (covers penalties)
          const win = wc ? ((wc.team && wc.team.abbreviation) || '').toLowerCase() : null;
          const [x, y] = cs[0].code < cs[1].code ? [cs[0], cs[1]] : [cs[1], cs[0]];
          byPair[x.code + '|' + y.code] = { a: x.code, b: y.code, sa: x.sc, sb: y.sc, fin, live, win };
        });
        if (Object.keys(byPair).length) this.setState({ results: byPair, resultsAt: new Date() });
      })
      .catch(() => {})
      .finally(() => { this._fetchingR = false; });
  }

  /* per-match real score, aligned to the (t1,t2) display order; null if not played */
  matchResult(t1, t2){
    const r = (this.state.results || {})[[t1, t2].sort().join('|')];
    if (!r) return null;
    return { s1: r.a === t1 ? r.sa : r.sb, s2: r.a === t1 ? r.sb : r.sa, fin: r.fin, live: r.live, win: r.win };
  }

  fifaRankOf(code){ const s = this.SQ(code); return (s && s.fifaRank) || 999; }

  /* build a live group table from real results; rows ordered by FIFA tiebreakers */
  groupTable(g){
    const res = this.state.results || {}, teams = this.GROUPS[g];
    const st = {}; teams.forEach(t => st[t] = { code: t, pl: 0, w: 0, d: 0, l: 0, gf: 0, ga: 0, pts: 0 });
    let played = 0;
    for (let i = 0; i < teams.length; i++) for (let j = i + 1; j < teams.length; j++) {
      const a = teams[i], b = teams[j], m = res[[a, b].sort().join('|')];
      if (!m || !m.fin) continue;
      played++;
      const sa = m.a === a ? m.sa : m.sb, sb = m.a === a ? m.sb : m.sa;
      st[a].pl++; st[b].pl++; st[a].gf += sa; st[a].ga += sb; st[b].gf += sb; st[b].ga += sa;
      if (sa > sb) { st[a].w++; st[b].l++; st[a].pts += 3; }
      else if (sa < sb) { st[b].w++; st[a].l++; st[b].pts += 3; }
      else { st[a].d++; st[b].d++; st[a].pts++; st[b].pts++; }
    }
    teams.forEach(t => st[t].gd = st[t].gf - st[t].ga);
    return { rows: this.rankTeams(teams.map(t => st[t]), res), played, complete: played === 6 };
  }

  /* FIFA group tiebreakers: pts → GD → GF → head-to-head (pts/GD/GF among tied) → FIFA rank */
  rankTeams(arr, res){
    const sorted = arr.slice().sort((x, y) => y.pts - x.pts || y.gd - x.gd || y.gf - x.gf);
    const out = [];
    let i = 0;
    while (i < sorted.length) {
      let j = i + 1;
      while (j < sorted.length && sorted[j].pts === sorted[i].pts && sorted[j].gd === sorted[i].gd && sorted[j].gf === sorted[i].gf) j++;
      const tied = sorted.slice(i, j);
      if (tied.length > 1) {
        const h = {}; tied.forEach(t => h[t.code] = { pts: 0, gd: 0, gf: 0 });
        for (let a = 0; a < tied.length; a++) for (let b = a + 1; b < tied.length; b++) {
          const ca = tied[a].code, cb = tied[b].code, m = res[[ca, cb].sort().join('|')];
          if (!m || !m.fin) continue;
          const sa = m.a === ca ? m.sa : m.sb, sb = m.a === ca ? m.sb : m.sa;
          h[ca].gf += sa; h[cb].gf += sb; h[ca].gd += sa - sb; h[cb].gd += sb - sa;
          if (sa > sb) h[ca].pts += 3; else if (sa < sb) h[cb].pts += 3; else { h[ca].pts++; h[cb].pts++; }
        }
        tied.sort((x, y) => h[y.code].pts - h[x.code].pts || h[y.code].gd - h[x.code].gd || h[y.code].gf - h[x.code].gf || this.fifaRankOf(x.code) - this.fifaRankOf(y.code));
      }
      tied.forEach(t => out.push(t)); i = j;
    }
    return out;
  }

  /* ---------- real bracket (auto-fill from results) ---------- */
  /* memoised per state object; recomputes whenever rank/thirds/winners/results change */
  realData(){
    if (this._rdKey === this.state && this._rd) return this._rd;
    const realRank = {};
    Object.keys(this.GROUPS).forEach(g => { const t = this.groupTable(g); if (t.complete) realRank[g] = t.rows.map(r => r.code); });
    const realThirds = this.computeRealThirds(realRank);
    const realWinners = {};
    const side = (m, sd) => {
      const s = m[sd];
      if (s.k === 'w') return realRank[s.g] ? realRank[s.g][0] : ((this.state.rank[s.g] || [])[0] || null);
      if (s.k === 'r') return realRank[s.g] ? realRank[s.g][1] : ((this.state.rank[s.g] || [])[1] || null);
      if (s.k === 't') return (realThirds && realThirds[m.no + sd]) || this.state.thirds[m.no + sd] || null;
      if (s.k === 'f') return realWinners[s.m] || this.state.winners[s.m] || null;
      if (s.k === 'l') { const fm = this.KOMAP[s.m], a = side(fm, 'a'), b = side(fm, 'b'), w = realWinners[s.m] || this.state.winners[s.m]; if (!a || !b || !w) return null; return w === a ? b : a; }
      return null;
    };
    this.KO.forEach(m => {                                   // KO array is in ascending no order
      const a = side(m, 'a'), b = side(m, 'b');
      if (a && b) { const r = this.matchResult(a, b); if (r && r.fin) realWinners[m.no] = r.win || (r.s1 > r.s2 ? a : (r.s2 > r.s1 ? b : null)); }
    });
    this._rd = { realRank, realThirds, realWinners }; this._rdKey = this.state;
    return this._rd;
  }

  /* assign the 8 best third-placed teams to their R32 slots (FIFA gs rules); null until all 12 groups done */
  computeRealThirds(realRank){
    const groups = Object.keys(this.GROUPS);
    if (groups.some(g => !realRank[g])) return null;
    let thirds = groups.map(g => ({ ...this.groupTable(g).rows[2], g }));
    thirds = thirds.sort((x, y) => y.pts - x.pts || y.gd - x.gd || y.gf - x.gf || this.fifaRankOf(x.code) - this.fifaRankOf(y.code)).slice(0, 8);
    const qual = thirds.map(t => t.g), slots = [];
    this.KO.filter(m => m.no <= 88).forEach(m => ['a', 'b'].forEach(sd => { if (m[sd].k === 't') slots.push({ key: m.no + sd, gs: m[sd].gs }); }));
    const used = {}, assign = {};
    const solve = i => {
      if (i === slots.length) return true;
      for (const g of slots[i].gs) { if (qual.includes(g) && !used[g]) { used[g] = true; assign[slots[i].key] = g; if (solve(i + 1)) return true; used[g] = false; delete assign[slots[i].key]; } }
      return false;
    };
    if (!solve(0)) return null;
    const byG = {}; thirds.forEach(t => byG[t.g] = t.code);
    const out = {}; Object.keys(assign).forEach(k => out[k] = byG[assign[k]]); return out;
  }

  /* team for a bracket side determined by REAL results, else null */
  realSide(m, sd){
    const R = this.realData(), s = m[sd];
    if (s.k === 'w') return R.realRank[s.g] ? R.realRank[s.g][0] : null;
    if (s.k === 'r') return R.realRank[s.g] ? R.realRank[s.g][1] : null;
    if (s.k === 't') return (R.realThirds && R.realThirds[m.no + sd]) || null;
    if (s.k === 'f') return R.realWinners[s.m] || null;
    if (s.k === 'l') { if (R.realWinners[s.m] == null) return null; const fm = this.KOMAP[s.m], a = this.resolveSideReal(fm, 'a'), b = this.resolveSideReal(fm, 'b'); if (!a || !b) return null; return R.realWinners[s.m] === a ? b : a; }
    return null;
  }
  /* real where known, otherwise the user's prediction */
  resolveSideReal(m, sd){ return this.realSide(m, sd) || this.resolveSide(this.state, m, sd); }

  persist(ns){
    clearTimeout(this._pt);
    this._pt = setTimeout(() => {
      try { localStorage.setItem('wc26v2-state', JSON.stringify({ rank:ns.rank, thirds:ns.thirds, winners:ns.winners })); } catch(e) {}
    }, 250);
  }

  commit(patch){
    const ns = {
      rank: { ...(patch.rank || this.state.rank) },
      thirds: { ...(patch.thirds || this.state.thirds) },
      winners: { ...(patch.winners || this.state.winners) }
    };
    this.validate(ns);
    this.setState(ns);
    this.persist(ns);
  }

  /* ---------- core resolution ---------- */
  resolveSide(st, m, side){
    const s = m[side];
    if (s.k === 'w') return (st.rank[s.g] || [])[0] || null;
    if (s.k === 'r') return (st.rank[s.g] || [])[1] || null;
    if (s.k === 't') return st.thirds[m.no + side] || null;
    if (s.k === 'f') return st.winners[s.m] || null;
    if (s.k === 'l') {
      const fm = this.KOMAP[s.m], w = st.winners[s.m];
      if (!w) return null;
      const a = this.resolveSide(st, fm, 'a'), b = this.resolveSide(st, fm, 'b');
      if (!a || !b) return null;
      return w === a ? b : a;
    }
    return null;
  }

  validate(st){
    const seen = {};
    this.KO.filter(m => m.no <= 88).forEach(m => ['a','b'].forEach(sd => {
      const s = m[sd]; if (s.k !== 't') return;
      const key = m.no + sd, p = st.thirds[key]; if (!p) return;
      const g = this.TG[p];
      const ok = s.gs.includes(g) && (st.rank[g] || [])[2] === p && !seen[p];
      if (!ok) delete st.thirds[key]; else seen[p] = key;
    }));
    for (let i = 0; i < 2; i++) this.KO.forEach(m => {
      const w = st.winners[m.no]; if (!w) return;
      const a = this.resolveSide(st, m, 'a'), b = this.resolveSide(st, m, 'b');
      if (w !== a && w !== b) delete st.winners[m.no];
    });
  }

  /* ---------- actions ---------- */
  tapTeam(g, t){
    const rank = { ...this.state.rank };
    let arr = (rank[g] || []).slice();
    if (arr.includes(t)) arr = arr.filter(x => x !== t);
    else if (arr.length < 4) arr.push(t);
    if (arr.length) rank[g] = arr; else delete rank[g];
    this.commit({ rank });
  }
  resetGroup(g){
    const rank = { ...this.state.rank }; delete rank[g];
    this.commit({ rank });
  }
  setThird(key, val, mno){
    const thirds = { ...this.state.thirds };
    if (val) thirds[key] = val; else delete thirds[key];
    const winners = { ...this.state.winners }; delete winners[mno];
    this.commit({ thirds, winners });
  }
  setWinner(mno, team){
    const winners = { ...this.state.winners };
    if (winners[mno] === team) delete winners[mno]; else winners[mno] = team;
    this.commit({ winners });
  }

  /* ---------- helpers ---------- */
  T(id){ const t = this.TEAMS[id]; return t ? t[1] + ' ' + t[0] : ''; }
  fmtD(d){ const x = new Date(d + 'T12:00:00'); return (x.getMonth()+1) + '/' + x.getDate(); }
  fmtW(d){ const x = new Date(d + 'T12:00:00'); return this.WD[x.getDay()]; }
  dayState(d){
    const n = new Date(), t0 = new Date(n.getFullYear(), n.getMonth(), n.getDate());
    const m = new Date(d + 'T12:00:00'), m0 = new Date(m.getFullYear(), m.getMonth(), m.getDate());
    if (m0 < t0) return -1; if (m0.getTime() === t0.getTime()) return 0; return 1;
  }
  roundName(no){ return no<=88?'32强':no<=96?'16强':no<=100?'8强':no<=102?'半决赛':no===103?'季军战':'决赛'; }

  /* ---------- bracket card builders ---------- */
  koSide(m, sd){
    const st = this.state, s = m[sd], key = m.no + sd, R = this.realData();
    const resolved = this.resolveSideReal(m, sd);
    const opp = this.resolveSideReal(m, sd === 'a' ? 'b' : 'a');
    const isReal = this.realSide(m, sd) != null;            // seed fixed by real results
    const played = R.realWinners[m.no] != null;             // this KO match已踢
    if (resolved && this.TEAMS[resolved]) {
      const win = played ? (R.realWinners[m.no] === resolved) : (st.winners[m.no] === resolved);
      const clickable = !played && !!(resolved && opp);     // 已踢的比赛不能改
      let seed;
      if (s.k === 'w') seed = s.g + '1';
      else if (s.k === 'r') seed = s.g + '2';
      else if (s.k === 't') seed = this.TG[resolved] + '3';
      else seed = this.TG[resolved] + '组';
      return {
        isTeam: true, flag: this.TEAMS[resolved][1], name: this.TEAMS[resolved][0], seed, real: isReal,
        seedBg: win ? '#0E8C4F' : '#ECE7D6', seedFg: win ? '#FFFFFF' : '#8B8770',
        bg: win ? '#E6F3E9' : 'transparent',
        cursor: clickable ? 'pointer' : 'default',
        mark: win ? '晋级 ✓' : (clickable ? '点我' : ''), markFg: win ? '#0E8C4F' : '#857E68',
        onClick: clickable ? (() => this.setWinner(m.no, resolved)) : undefined,
        canClear: s.k === 't' && !isReal,
        onClear: (s.k === 't' && !isReal) ? ((e) => { e.stopPropagation(); this.setThird(key, '', m.no); }) : undefined
      };
    }
    if (s.k === 't') {
      const opts = s.gs.map(g => {
        const t3 = (st.rank[g] || [])[2];
        if (!t3) return { v: 'x' + g, label: g + '组第3 · 未排名', dis: true };
        const usedKey = Object.keys(st.thirds).find(k2 => st.thirds[k2] === t3 && k2 !== key);
        return { v: t3, label: this.T(t3) + ' · ' + g + '组第3' + (usedKey ? '(已占用)' : ''), dis: !!usedKey };
      });
      return { isSelect: true, label: '最佳第3(' + s.gs.join('/') + ')— 选队', opts,
        onChange: (e) => { const v = e.target.value; if (v && v[0] !== 'x') this.setThird(key, v, m.no); } };
    }
    let label, click = null;
    if (s.k === 'w') { label = s.g + '组 第1 · 去「小组」页排名'; click = () => this.setState({ tab: 'grp' }); }
    else if (s.k === 'r') { label = s.g + '组 第2 · 去「小组」页排名'; click = () => this.setState({ tab: 'grp' }); }
    else if (s.k === 'f') label = 'M' + s.m + ' 胜者 · 待推演';
    else label = 'M' + s.m + ' 负者 · 待推演';
    return { isEmpty: true, label, onClick: click || undefined, cursor: click ? 'pointer' : 'default' };
  }

  koCard(m, isLast){
    const V = this.VEN[m.v];
    const roundTag = m.no === 104 ? '决赛 🏆' : m.no === 103 ? '季军战' : '';
    return {
      mno: 'M' + m.no,
      tagline: (roundTag ? roundTag + ' · ' : '') + this.fmtD(m.d) + ' ' + this.fmtW(m.d),
      venLine: '📍 ' + V[0] + ' · ' + V[1],
      bg: '#FFFFFF',
      bd: '#DCD6C2',
      op: 1,
      stub: isLast ? 'transparent' : '#D5CEB8',
      sides: [this.koSide(m, 'a'), this.koSide(m, 'b')]
    };
  }

  usaPath(){
    const st = this.state, steps = [];
    const dArr = st.rank.D || [];
    const pos = dArr.indexOf('usa');
    if (pos < 0 && dArr.length >= 3) steps.push('小组赛:你预测美国 D 组垫底出局 😬');
    else if (pos < 0) steps.push('先在「小组」页给 D 组排名');
    else steps.push('小组赛:D 组第' + (pos + 1) + (pos < 2 ? ' · 晋级 32 强' : pos === 2 ? ' · 须挤进最佳第3' : ' · 出局'));
    this.KO.forEach(m => {
      const a = this.resolveSide(st, m, 'a'), b = this.resolveSide(st, m, 'b');
      if (a === 'usa' || b === 'usa') {
        const opp = a === 'usa' ? b : a;
        const V = this.VEN[m.v], w = st.winners[m.no];
        const res = w === 'usa' ? '晋级 ✓' : w ? '止步于此' : '待点选';
        steps.push(this.roundName(m.no) + ' M' + m.no + ' · ' + this.fmtD(m.d) + ' ' + V[1] + ' vs ' + (opp ? this.TEAMS[opp][0] : '待定') + ' — ' + res);
      }
    });
    if (st.winners[104] === 'usa') steps.push('🏆 你预测美国夺冠!');
    return steps;
  }

  /* ---------- share image ---------- */
  generateShare(){
    const st = this.state;
    const draw = () => {
      const W = 1080, H = 1350;
      const c = document.createElement('canvas'); c.width = W; c.height = H;
      const ctx = c.getContext('2d');
      const ct = (txt, y, font, color) => { ctx.font = font; ctx.fillStyle = color; ctx.textAlign = 'center'; ctx.fillText(txt, W/2, y); };
      ctx.fillStyle = '#F2EEE2'; ctx.fillRect(0, 0, W, H);
      const band = (y) => { ctx.fillStyle='#C8332B'; ctx.fillRect(0,y,W/3,14); ctx.fillStyle='#0E8C4F'; ctx.fillRect(W/3,y,W/3,14); ctx.fillStyle='#1D5FBF'; ctx.fillRect(2*W/3,y,W/3,14); };
      band(0);
      ctx.fillStyle = '#142019'; ctx.fillRect(0, 14, W, 250);
      ct('世界杯 2026', 130, "900 80px 'Noto Sans SC', sans-serif", '#F4F0E4');
      ct('我 的 晋 级 预 测', 200, "500 30px 'Noto Sans SC', sans-serif", '#9FB8A8');
      const champ = st.winners[104];
      ct('冠 军 预 测', 350, "700 30px 'Noto Sans SC', sans-serif", '#8B8770');
      if (champ && this.TEAMS[champ]) {
        ct(this.TEAMS[champ][1], 510, '140px sans-serif', '#191D17');
        ct(this.TEAMS[champ][0], 640, "900 80px 'Noto Sans SC', sans-serif", '#191D17');
      } else {
        ct('?', 530, "900 160px 'Barlow', sans-serif", '#C9C2AA');
        ct('尚未选出 · 去「对阵」页点选', 630, "500 32px 'Noto Sans SC', sans-serif", '#8B8770');
      }
      ctx.strokeStyle = '#D5CEB8'; ctx.lineWidth = 2;
      ctx.beginPath(); ctx.moveTo(80, 700); ctx.lineTo(W - 80, 700); ctx.stroke();
      const fa = this.resolveSide(st, this.KOMAP[104], 'a'), fb = this.resolveSide(st, this.KOMAP[104], 'b');
      ct('决赛 · 7/19 纽约 MetLife', 760, "600 28px 'Noto Sans SC', sans-serif", '#8B8770');
      ct((fa ? this.T(fa) : '待定') + '   vs   ' + (fb ? this.T(fb) : '待定'), 820, "700 44px 'Noto Sans SC', sans-serif", '#191D17');
      const semis = [];
      [101,102].forEach(no => ['a','b'].forEach(sd => { const t = this.resolveSide(st, this.KOMAP[no], sd); if (t) semis.push(this.T(t)); }));
      ct('四强', 910, "600 28px 'Noto Sans SC', sans-serif", '#8B8770');
      ct(semis.length ? semis.join(' · ') : '待定', 962, "600 32px 'Noto Sans SC', sans-serif", '#191D17');
      ct('🇺🇸 美国队推演', 1060, "600 28px 'Noto Sans SC', sans-serif", '#8B8770');
      const steps = this.usaPath().slice(0, 4);
      steps.forEach((s2, i) => ct(s2, 1110 + i * 44, "500 27px 'Noto Sans SC', sans-serif", '#3D443C'));
      band(H - 14);
      ctx.fillStyle = '#6F6856'; ctx.font = "500 22px 'Noto Sans SC', sans-serif"; ctx.textAlign = 'center';
      ctx.fillText('世界杯 2026 观赛手册 · 自制预测 · 仅供娱乐', W/2, H - 40);
      this._shareCanvas = c;
      this.setState({ shareImg: c.toDataURL('image/png') });
    };
    if (document.fonts && document.fonts.ready) document.fonts.ready.then(draw); else draw();
  }

  saveShare(){
    const c = this._shareCanvas; if (!c) return;
    c.toBlob((blob) => {
      if (!blob) return;
      const file = new File([blob], '世界杯2026-我的预测.png', { type: 'image/png' });
      if (navigator.canShare && navigator.canShare({ files: [file] })) {
        navigator.share({ files: [file], title: '世界杯 2026 · 我的预测' }).catch(() => {});
      } else {
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a'); a.href = url; a.download = file.name;
        document.body.appendChild(a); a.click(); a.remove();
        setTimeout(() => URL.revokeObjectURL(url), 2000);
      }
    }, 'image/png');
  }

  /* ---------- renderVals ---------- */
  renderVals(){
    const st = this.state;
    const vals = {
      goSched: () => this.setState({ tab: 'sched' }),
      goGrp: () => this.setState({ tab: 'grp' }),
      goKo: () => this.setState({ tab: 'ko' }),
      goTeam: () => this.setState({ tab: 'team' }),
      goShare: () => this.setState({ tab: 'share' }),
      showSched: st.tab === 'sched', showGrp: st.tab === 'grp',
      showKo: st.tab === 'ko', showTeam: st.tab === 'team', showShare: st.tab === 'share',
      tabFg: {}, tabBg: {}
    };
    ['sched','grp','ko','team','share'].forEach(t => {
      vals.tabFg[t] = st.tab === t ? '#191D17' : '#8B8770';
      vals.tabBg[t] = st.tab === t ? '#C8332B' : 'transparent';
    });

    /* schedule */
    vals.groupSel = st.groupSel;
    vals.onGroupSel = (e) => this.setState({ groupSel: e.target.value });
    vals.groupOpts = Object.keys(this.GROUPS).map(g => ({ v: g, label: g + ' 组' }));
    const chipDefs = [['all','全部 52 场'],['W','西部'],['C','中部'],['E','东部']];
    vals.chips = chipDefs.map(([id, label]) => {
      const on = st.filter === id;
      return { label, bg: on ? '#191D17' : '#FFFFFF', fg: on ? '#F2EEE2' : '#191D17',
        bd: on ? '#191D17' : '#D8D2BE', onClick: () => this.setState({ filter: id }) };
    });
    const list = this.GM.filter(m => {
      const v = this.VEN[m[5]];
      if (st.groupSel && m[2] !== st.groupSel) return false;
      if (st.filter === 'W') return v[2] === 'W';
      if (st.filter === 'C') return v[2] === 'C';
      if (st.filter === 'E') return v[2] === 'E';
      return true;
    });
    const days = [];
    list.forEach(mm => {
      const [no, d, g, t1, t2, vk] = mm;
      const V = this.VEN[vk], ds = this.dayState(d);
      let day = days[days.length - 1];
      if (!day || day.d !== d) {
        const x = new Date(d + 'T12:00:00');
        day = { d, dnum: (x.getMonth()+1) + '.' + x.getDate(), wd: this.fmtW(d), matches: [] };
        days.push(day);
      }
      const tags = [{ t: g + ' 组', bg: '#E7EEF8', fg: '#2A4E8C' }];
      if (ds === 0) tags.push({ t: '今天', bg: '#191D17', fg: '#FFFFFF' });
      if (ds === -1) tags.push({ t: '已结束', bg: '#E2DECE', fg: '#6F6856' });
      tags.push({ t: 'M' + no, bg: '#ECE7D6', fg: '#8B8770' });
      const railC = { W: '#1D5FBF', C: '#0E8C4F', E: '#C8332B' }[V[2]];
      const o = st.odds[no];
      let odds = null;
      if (o) {
        const tot = o.p1 + o.pd + o.p2;
        if (tot > 0.5) {
          const q1 = Math.round(o.p1 / tot * 100), qd = Math.round(o.pd / tot * 100);
          odds = { q1, qd, q2: Math.max(0, 100 - q1 - qd),
            n1: this.TEAMS[t1][0], n2: this.TEAMS[t2][0],
            src: o.closed ? '已收盘' : (o.live ? '🔴 直播中 · Polymarket' : 'Polymarket 实时') };
        }
      } else if (ODDS_SLUGS[no]) {
        odds = { loading: true };
      }
      const hasSquad = !!(this.SQ(t1) || this.SQ(t2));
      const rr = this.matchResult(t1, t2);
      let result = null;
      if (rr) {
        const winNm = rr.s1 === rr.s2 ? '' : (rr.s1 > rr.s2 ? this.TEAMS[t1][0] : this.TEAMS[t2][0]);
        result = { s1: rr.s1, s2: rr.s2, fin: rr.fin, live: rr.live,
          tag: rr.live ? '🔴 直播' : '完场', tagBg: rr.live ? '#FBE9E7' : '#E6F3E9', tagFg: rr.live ? '#C8332B' : '#0E8C4F',
          out: rr.s1 === rr.s2 ? '平局' : winNm + ' 胜', outFg: rr.s1 === rr.s2 ? '#8A6A0B' : '#0E8C4F' };
      }
      day.matches.push({
        mno: no, t1: this.T(t1), t2: this.T(t2),
        ven: V[0], city: V[1],
        bg: result && result.fin ? '#FBFAF4' : '#FFFFFF', bd: '#DCD6C2',
        rail: railC, tags, odds, hasSquad, result
      });
    });
    days.forEach(day => { day.count = day.matches.length; });
    vals.schedDays = days;
    vals.schedEmpty = list.length === 0;

    /* groups */
    const doneCount = Object.keys(this.GROUPS).filter(g => (st.rank[g] || []).length >= 3).length;
    vals.grpDoneLabel = String(doneCount);
    vals.onResetGroups = () => { if (confirm('清空所有小组排名?(受影响的淘汰赛推演也会被清掉)')) this.commit({ rank: {} }); };
    vals.groupCards = Object.keys(this.GROUPS).map(g => {
      const arr = st.rank[g] || [];
      const complete = arr.length >= 3;
      const teams = this.GROUPS[g].map(t => {
        const idx = arr.indexOf(t);
        const implied4 = idx < 0 && arr.length >= 3;
        let chipBg = 'transparent', chipFg = '#857E68', chipBd = '1.5px dashed #C9C2AA', note = '', noteFg = '#6F6856', fg = '#191D17', bg = '#FFFFFF';
        if (idx === 0) { chipBg = '#0E8C4F'; chipFg = '#FFFFFF'; chipBd = '1.5px solid #0E8C4F'; note = '晋级 · 头名'; noteFg = '#0E8C4F'; }
        else if (idx === 1) { chipBg = '#1D5FBF'; chipFg = '#FFFFFF'; chipBd = '1.5px solid #1D5FBF'; note = '晋级'; noteFg = '#1D5FBF'; }
        else if (idx === 2) { chipBg = '#B8860B'; chipFg = '#FFFFFF'; chipBd = '1.5px solid #B8860B'; note = '最佳第3候选'; noteFg = '#8A6A0B'; }
        else if (idx === 3 || implied4) { chipBg = '#E2DECE'; chipFg = '#8B8770'; chipBd = '1.5px solid #E2DECE'; note = '出局'; fg = '#6F6856'; bg = '#FAF8F0'; }
        return {
          flag: this.TEAMS[t][1], name: this.TEAMS[t][0],
          rankNum: idx >= 0 ? String(idx + 1) : (implied4 ? '4' : '–'),
          chipBg, chipFg, chipBd, note, noteFg, fg, bg,
          onTap: () => this.tapTeam(g, t)
        };
      });
      /* actual standings from live results */
      const gt = this.groupTable(g);
      const realRows = gt.rows.map((r, idx) => {
        let bg = '#E2DECE', fg = '#8B8770';
        if (gt.played) {
          if (idx === 0) { bg = '#0E8C4F'; fg = '#FFFFFF'; }
          else if (idx === 1) { bg = '#1D5FBF'; fg = '#FFFFFF'; }
          else if (idx === 2) { bg = '#B8860B'; fg = '#FFFFFF'; }
        }
        return { pos: idx + 1, flag: this.TEAMS[r.code][1], name: this.TEAMS[r.code][0],
          pl: r.pl, pts: r.pts, gd: (r.gd > 0 ? '+' : '') + r.gd, bg, fg };
      });
      let cmp = '';
      if (gt.complete && arr.length >= 2) {
        const realTop2 = gt.rows.slice(0, 2).map(r => r.code);
        const hit = arr.slice(0, 2).filter(c => realTop2.includes(c)).length;
        cmp = '晋级命中 ' + hit + '/2';
      }
      return {
        g, teams,
        bd: complete ? '#BFD8C5' : '#DCD6C2',
        headBg: complete ? '#E6F3E9' : '#F7F4E9',
        status: complete ? '已完成 ✓' : (arr.length ? '已排 ' + arr.length + ' 队' : '点队伍排序'),
        statusFg: complete ? '#0E8C4F' : '#6F6856',
        onReset: () => this.resetGroup(g),
        realRows, played: gt.played, realComplete: gt.complete, cmp
      };
    });

    /* bracket */
    const champ = st.winners[104];
    vals.hasChamp = !!champ;
    vals.champName = champ ? this.T(champ) : '';
    vals.onResetKO = () => { if (confirm('清空淘汰赛推演?(小组排名保留)')) this.commit({ thirds: {}, winners: {} }); };
    const roundDefs = [
      ['32 强', '6/28 – 7/3', m => m.no <= 88],
      ['16 强', '7/4 – 7/7', m => m.no >= 89 && m.no <= 96],
      ['8 强', '7/9 – 7/11', m => m.no >= 97 && m.no <= 100],
      ['半决赛', '7/14 – 7/15', m => m.no === 101 || m.no === 102],
      ['决赛', '7/18 – 7/19', m => m.no === 104 || m.no === 103]
    ];
    vals.rounds = roundDefs.map(([title, sub, f], i) => ({
      title, sub,
      matches: this.KO.filter(f).map(m => this.koCard(m, i === roundDefs.length - 1))
    }));
    vals.koJump = roundDefs.map(([title], i) => ({
      label: title,
      onClick: () => { const el = this.bracketRef.current; if (el) el.scrollTo({ left: i * 278, behavior: 'smooth' }); }
    }));

    /* champion odds board */
    vals.champRows = null;
    vals.oddsTime = st.oddsAt ? st.oddsAt.toLocaleTimeString('zh-CN', { hour: '2-digit', minute: '2-digit' }) : '';
    if (st.champ && st.champ.length) {
      const maxP = st.champ[0].p || 1;
      const rows = st.champ.slice(0, 8).map((c, i) => ({ ...c, rank: i + 1 }));
      if (champ) {
        const idx = st.champ.findIndex(c => NAME2CODE[c.name] === champ);
        if (idx >= 8) rows.push({ ...st.champ[idx], rank: idx + 1 });
      }
      vals.champRows = rows.map(c => {
        const code = NAME2CODE[c.name];
        const hl = !!champ && code === champ;
        return {
          rank: c.rank,
          flag: code ? this.TEAMS[code][1] : '🏳️',
          name: code ? this.TEAMS[code][0] : c.name,
          pct: (c.p * 100).toFixed(1) + '%',
          barW: Math.max(2, Math.round(c.p / maxP * 100)) + '%',
          fill: hl ? '#E8C25A' : '#0E8C4F', hl
        };
      });
    }

    /* share */
    vals.koDone = String(Object.keys(st.winners).length);
    const fa = this.resolveSide(st, this.KOMAP[104], 'a'), fb = this.resolveSide(st, this.KOMAP[104], 'b');
    vals.sumChamp = champ ? '🏆 ' + this.T(champ) : '—';
    vals.sumRunner = champ && fa && fb ? this.T(champ === fa ? fb : fa) : '—';
    const semis = [];
    [101,102].forEach(no => ['a','b'].forEach(sd => { const t = this.resolveSide(st, this.KOMAP[no], sd); if (t) semis.push(this.T(t)); }));
    vals.sumSemis = semis.length ? semis.join(' · ') : '—';
    vals.usaSteps = this.usaPath().map(t => ({ t }));
    vals.onShare = () => this.generateShare();
    vals.onSaveShare = () => this.saveShare();
    vals.shareImg = st.shareImg;
    vals.hasShareImg = !!st.shareImg;

    /* teams browser — all 48, grouped A–L */
    let withData = 0;
    vals.teamGroups = Object.keys(this.GROUPS).map(g => ({
      g,
      teams: this.GROUPS[g].map(code => {
        const t = this.SQ(code), T = this.TEAMS[code];
        if (t) withData++;
        return {
          code, flag: T ? T[1] : '🏳️', name: T ? T[0] : code,
          sub: t ? (t.formation + (t.fifaRank ? ' · FIFA ' + t.fifaRank : '')) : '数据整理中',
          hasData: !!t,
          onTap: () => this.openTeam(code)
        };
      })
    }));
    vals.teamCoverage = withData;

    return vals;
  }

  render(){
    const vals = this.renderVals();
    return html`
<div data-screen-label="页头" style="position:relative;overflow:hidden;background:#142019;color:#F4F0E4;padding:calc(22px + env(safe-area-inset-top)) calc(18px + env(safe-area-inset-right)) 18px calc(18px + env(safe-area-inset-left))">

    <div style="display:flex;align-items:center;gap:9px;padding:7px 0;border-top:1px solid #EFEADB"><span style="width:42px;font-size:12px;color:#8B8770;flex:none">四强</span><span style="font-size:14px;font-weight:500">${vals.sumSemis}</span></div>
    <div style="padding:8px 0 2px;border-top:1px solid #EFEADB">
      <div style="font-size:12px;color:#8B8770;margin-bottom:5px">🇺🇸 美国队推演</div>
      ${vals.usaSteps.map(u => html`<div style="font-size:13px;color:#3D443C;padding:2.5px 0">${u.t}</div>`)}
    </div>
  </div>
  <button class="presslight" onClick=${vals.onShare} style="width:100%;padding:15px;border:none;border-radius:12px;background:#142019;color:#F4F0E4;font-size:16px;font-weight:700;font-family:'Barlow Condensed','Noto Sans SC',sans-serif;letter-spacing:2px;cursor:pointer">生成分享图 →</button>
  ${vals.hasShareImg && html`
    <div>
      <img src=${vals.shareImg} alt="我的世界杯预测" style="width:100%;border-radius:14px;border:1px solid #DCD6C2;margin-top:12px;animation:fadeup .3s ease">
      <div style="display:flex;gap:10px;align-items:center;margin-top:10px;flex-wrap:wrap">
        <button class="presslight" onClick=${vals.onSaveShare} style="padding:11px 20px;border-radius:10px;background:#142019;border:none;color:#F4F0E4;font-size:14px;font-weight:700;cursor:pointer;font-family:inherit">保存 / 分享图片</button>
        <span style="font-size:12px;color:#8B8770">或长按上图保存</span>
      </div>
    </div>`}
</section>`}

${vals.showTeam && html`
<section style="max-width:1020px;margin:0 auto;padding:16px 14px 10px;animation:fadeup .25s ease">
  <div style="font-size:12.5px;color:#6B7263;background:#E9E4D2;border-radius:10px;padding:10px 13px;margin-bottom:14px;line-height:1.55">点任意一支球队,看<b style="color:#191D17">预计首发(英文名 + 号码 + 位置 + 效力俱乐部 + 身价)</b>、常见战术、看点和重点球员。赛程页里点某场比赛也能直接看双方阵容。</div>
  ${vals.teamGroups.map(grp => html`
    <div style="display:flex;align-items:baseline;gap:9px;margin:18px 2px 9px">
      <span style="font-family:'Anton',sans-serif;font-size:24px;letter-spacing:1px;color:#191D17">${grp.g}</span>
      <span style="font-size:13px;font-weight:600;color:#6B7263">组</span>
      <span style="flex:1;height:1px;background:#DCD6C2"></span>
    </div>
    <div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(150px,1fr));gap:9px">
      ${grp.teams.map(tm => html`
        <button class="rowtap" onClick=${tm.onTap} style=${`display:flex;align-items:center;gap:9px;padding:11px 12px;border:1px solid ${tm.hasData ? '#DCD6C2' : '#E6E0CE'};border-radius:11px;background:${tm.hasData ? '#FFFFFF' : '#FAF8F0'};cursor:pointer;text-align:left;font-family:inherit;width:100%;transition:background .15s`}>
          <span style="font-size:24px;flex:none">${tm.flag}</span>
          <div style="flex:1;min-width:0">
            <div style="font-size:14.5px;font-weight:700;color:#191D17;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">${tm.name}</div>
            <div style=${`font-size:10.5px;color:${tm.hasData ? '#6F6856' : '#A9A48C'};white-space:nowrap;overflow:hidden;text-overflow:ellipsis`}>${tm.sub}</div>
          </div>
          ${tm.hasData && html`<span style="flex:none;color:#0E8C4F;font-size:14px;font-weight:700">›</span>`}
        </button>`)}
    </div>`)}
  <div style="margin-top:18px;font-size:11px;color:#A9A48C;text-align:center">已收录 ${vals.teamCoverage} / 48 队阵容 · 身价来源 Transfermarkt · 预计首发,实际以开赛公布为准</div>
</section>`}

</main>
${this.renderDetail()}
<footer style="padding:22px 16px calc(30px + env(safe-area-inset-bottom));text-align:center;font-size:11px;color:#6F6856">开球时间以 FIFA 官网 / 官方 App 为准 · 预测自动保存在本机 · 胜率数据来自 Polymarket · 仅供娱乐 · <a href="en/" style="color:#6B7263;font-weight:600;text-decoration:none">English</a></footer>`;
  }
}

render(h(App), document.getElementById('app'));
</script>
</body>
</html>
