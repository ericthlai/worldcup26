        this.validate(restored);
        this.setState(restored);
      }
    } catch(e) {}
    this.fetchOdds();
    this._oddsTimer = setInterval(() => this.fetchOdds(), 5 * 60 * 1000);
  }
  componentWillUnmount(){ clearInterval(this._oddsTimer); }

  /* ---------- Polymarket odds ---------- */
  marketProb(mk){
    try { const p = parseFloat(JSON.parse(mk.outcomePrices)[0]); if (!isNaN(p)) return p; } catch(e) {}
    if (typeof mk.lastTradePrice === 'number') return mk.lastTradePrice;
    return null;
  }
  async fetchOdds(){
    if (this._fetching) return;
    this._fetching = true;
    try {
    const nos = Object.keys(ODDS_SLUGS);
    const batches = [];
    for (let i = 0; i < nos.length; i += 13) batches.push(nos.slice(i, i + 13).map(n => ODDS_SLUGS[n]));
    const reqs = batches.map(b =>
      fetch(GAMMA + '/events?' + b.map(s => 'slug=' + s).join('&')).then(r => r.json()).catch(() => []));
    reqs.push(fetch(GAMMA + '/events?slug=world-cup-winner').then(r => r.json()).catch(() => []));
    const results = await Promise.all(reqs);
    const champRaw = results.pop();
    const bySlug = {};
    results.flat().forEach(ev => { if (ev && ev.slug) bySlug[ev.slug] = ev; });
    const odds = {};
    nos.forEach(no => {
      const ev = bySlug[ODDS_SLUGS[no]];
      if (!ev || !ev.markets || !ev.title) return;
      const names = ev.title.split(' vs. ').map(s => s.trim());
      let pA = null, pD = null, pB = null;
      ev.markets.forEach(mk => {
        const g = mk.groupItemTitle || '';
        const p = this.marketProb(mk);
        if (p == null) return;
        if (g.indexOf('Draw') === 0) pD = p;
        else if (g === names[0]) pA = p;
        else if (g === names[1]) pB = p;
      });
      if (pA == null || pD == null || pB == null) return;
      if (ODDS_SWAP[no]) { const t = pA; pA = pB; pB = t; }
      odds[no] = { p1: pA, pd: pD, p2: pB, closed: !!ev.closed, live: !!ev.live };
    });
    let champ = null;
    const champEv = Array.isArray(champRaw) ? champRaw[0] : null;
    if (champEv && champEv.markets) {
      champ = [];
      champEv.markets.forEach(mk => {
        const p = this.marketProb(mk);
        if (p != null && mk.groupItemTitle) champ.push({ name: mk.groupItemTitle, p });
      });
      champ.sort((a, b) => b.p - a.p);
    }
    this.setState({ odds: Object.keys(odds).length ? { ...this.state.odds, ...odds } : this.state.odds, champ: champ || this.state.champ, oddsAt: new Date() });
    } finally { this._fetching = false; }
  }

    this.validate(ns);
    this.setState(ns);
    this.persist(ns);

  resolveSide(st, m, side){
    const s = m[side];
    if (s.k === 'w') return (st.rank[s.g] || [])[0] || null;
    if (s.k === 'r') return (st.rank[s.g] || [])[1] || null;
    if (s.k === 't') return st.thirds[m.no + side] || null;
    if (s.k === 'f') return st.winners[s.m] || null;
    if (s.k === 'l') {
      const fm = this.KOMAP[s.m], w = st.winners[s.m];
      if (!w) return null;
      const a = this.resolveSide(st, fm, 'a'), b = this.resolveSide(st, fm, 'b');
      if (!a || !b) return null;
      return w === a ? b : a;
    }
    return null;
  }

    const seen = {};
    this.KO.filter(m => m.no <= 88).forEach(m => ['a','b'].forEach(sd => {
      const s = m[sd]; if (s.k !== 't') return;
      const key = m.no + sd, p = st.thirds[key]; if (!p) return;
      const g = this.TG[p];
      const ok = s.gs.includes(g) && (st.rank[g] || [])[2] === p && !seen[p];
      if (!ok) delete st.thirds[key]; else seen[p] = key;
    }));
    for (let i = 0; i < 2; i++) this.KO.forEach(m => {
      const w = st.winners[m.no]; if (!w) return;
      const a = this.resolveSide(st, m, 'a'), b = this.resolveSide(st, m, 'b');
      if (w !== a && w !== b) delete st.winners[m.no];
    });
  }

  /* ---------- actions ---------- */
  tapTeam(g, t){
    const rank = { ...this.state.rank };
    let arr = (rank[g] || []).slice();
    if (arr.includes(t)) arr = arr.filter(x => x !== t);
    else if (arr.length < 4) arr.push(t);
    if (arr.length) rank[g] = arr; else delete rank[g];
    this.commit({ rank });
  }
  resetGroup(g){
    const rank = { ...this.state.rank }; delete rank[g];
    this.commit({ rank });
  }
  setThird(key, val, mno){
    const thirds = { ...this.state.thirds };
    if (val) thirds[key] = val; else delete thirds[key];
    const winners = { ...this.state.winners }; delete winners[mno];
    this.commit({ thirds, winners });
  }
  setWinner(mno, team){
    const winners = { ...this.state.winners };
    if (winners[mno] === team) delete winners[mno]; else winners[mno] = team;
    this.commit({ winners });
  }

  /* ---------- helpers ---------- */
  T(id){ const t = this.TEAMS[id]; return t ? t[1] + ' ' + t[0] : ''; }
  fmtD(d){ const x = new Date(d + 'T12:00:00'); return (x.getMonth()+1) + '/' + x.getDate(); }
  fmtW(d){ const x = new Date(d + 'T12:00:00'); return this.WD[x.getDay()]; }
  dayState(d){
    const n = new Date(), t0 = new Date(n.getFullYear(), n.getMonth(), n.getDate());
    const m = new Date(d + 'T12:00:00'), m0 = new Date(m.getFullYear(), m.getMonth(), m.getDate());
    if (m0 < t0) return -1; if (m0.getTime() === t0.getTime()) return 0; return 1;
  }
  roundName(no){ return no<=88?'32强':no<=96?'16强':no<=100?'8强':no<=102?'半决赛':no===103?'季军战':'决赛'; }

  /* ---------- bracket card builders ---------- */
  koSide(m, sd){
    const st = this.state, s = m[sd], key = m.no + sd;
    const resolved = this.resolveSide(st, m, sd);
    const opp = this.resolveSide(st, m, sd === 'a' ? 'b' : 'a');
    if (resolved && this.TEAMS[resolved]) {
      const win = st.winners[m.no] === resolved;
      const clickable = !!(resolved && opp);
      let seed;
      if (s.k === 'w') seed = s.g + '1';
      else if (s.k === 'r') seed = s.g + '2';
      else if (s.k === 't') seed = this.TG[resolved] + '3';
      else seed = this.TG[resolved] + '组';
      return {
        isTeam: true, flag: this.TEAMS[resolved][1], name: this.TEAMS[resolved][0], seed,
        seedBg: win ? '#0E8C4F' : '#ECE7D6', seedFg: win ? '#FFFFFF' : '#8B8770',
        bg: win ? '#E6F3E9' : 'transparent',
        cursor: clickable ? 'pointer' : 'default',
        mark: win ? '晋级 ✓' : (clickable ? '点我' : ''), markFg: win ? '#0E8C4F' : '#857E68',
        onClick: clickable ? (() => this.setWinner(m.no, resolved)) : undefined,
        canClear: s.k === 't',
        onClear: s.k === 't' ? ((e) => { e.stopPropagation(); this.setThird(key, '', m.no); }) : undefined
      };
    }
    if (s.k === 't') {
      const opts = s.gs.map(g => {
        const t3 = (st.rank[g] || [])[2];
        if (!t3) return { v: 'x' + g, label: g + '组第3 · 未排名', dis: true };
        const usedKey = Object.keys(st.thirds).find(k2 => st.thirds[k2] === t3 && k2 !== key);
        return { v: t3, label: this.T(t3) + ' · ' + g + '组第3' + (usedKey ? '(已占用)' : ''), dis: !!usedKey };
      });
      return { isSelect: true, label: '最佳第3(' + s.gs.join('/') + ')— 选队', opts,
        onChange: (e) => { const v = e.target.value; if (v && v[0] !== 'x') this.setThird(key, v, m.no); } };
    }
    let label, click = null;
    if (s.k === 'w') { label = s.g + '组 第1 · 去「小组」页排名'; click = () => this.setState({ tab: 'grp' }); }
    else if (s.k === 'r') { label = s.g + '组 第2 · 去「小组」页排名'; click = () => this.setState({ tab: 'grp' }); }
    else if (s.k === 'f') label = 'M' + s.m + ' 胜者 · 待推演';
    else label = 'M' + s.m + ' 负者 · 待推演';
    return { isEmpty: true, label, onClick: click || undefined, cursor: click ? 'pointer' : 'default' };
  }

  koCard(m, isLast){
    const V = this.VEN[m.v];
    const roundTag = m.no === 104 ? '决赛 🏆' : m.no === 103 ? '季军战' : '';
    return {
      mno: 'M' + m.no,
      tagline: (roundTag ? roundTag + ' · ' : '') + this.fmtD(m.d) + ' ' + this.fmtW(m.d),
      venLine: '📍 ' + V[0] + ' · ' + V[1],
      bg: '#FFFFFF',
      bd: '#DCD6C2',
      op: 1,
      stub: isLast ? 'transparent' : '#D5CEB8',
      sides: [this.koSide(m, 'a'), this.koSide(m, 'b')]
    };
  }

  usaPath(){
    const st = this.state, steps = [];
    const dArr = st.rank.D || [];
    const pos = dArr.indexOf('usa');
    if (pos < 0 && dArr.length >= 3) steps.push('小组赛:你预测美国 D 组垫底出局 😬');
    else if (pos < 0) steps.push('先在「小组」页给 D 组排名');
    else steps.push('小组赛:D 组第' + (pos + 1) + (pos < 2 ? ' · 晋级 32 强' : pos === 2 ? ' · 须挤进最佳第3' : ' · 出局'));
    this.KO.forEach(m => {
      const a = this.resolveSide(st, m, 'a'), b = this.resolveSide(st, m, 'b');
      if (a === 'usa' || b === 'usa') {
        const opp = a === 'usa' ? b : a;
        const V = this.VEN[m.v], w = st.winners[m.no];
        const res = w === 'usa' ? '晋级 ✓' : w ? '止步于此' : '待点选';
        steps.push(this.roundName(m.no) + ' M' + m.no + ' · ' + this.fmtD(m.d) + ' ' + V[1] + ' vs ' + (opp ? this.TEAMS[opp][0] : '待定') + ' — ' + res);
      }
    });
    if (st.winners[104] === 'usa') steps.push('🏆 你预测美国夺冠!');
    return steps;
  }

  /* ---------- share image ---------- */
  generateShare(){
    const st = this.state;
    const draw = () => {
      const W = 1080, H = 1350;
      const c = document.createElement('canvas'); c.width = W; c.height = H;
      const ctx = c.getContext('2d');
      const ct = (txt, y, font, color) => { ctx.font = font; ctx.fillStyle = color; ctx.textAlign = 'center'; ctx.fillText(txt, W/2, y); };
      ctx.fillStyle = '#F2EEE2'; ctx.fillRect(0, 0, W, H);
      const band = (y) => { ctx.fillStyle='#C8332B'; ctx.fillRect(0,y,W/3,14); ctx.fillStyle='#0E8C4F'; ctx.fillRect(W/3,y,W/3,14); ctx.fillStyle='#1D5FBF'; ctx.fillRect(2*W/3,y,W/3,14); };
      band(0);
      ctx.fillStyle = '#142019'; ctx.fillRect(0, 14, W, 250);
      ct('世界杯 2026', 130, "900 80px 'Noto Sans SC', sans-serif", '#F4F0E4');
      ct('我 的 晋 级 预 测', 200, "500 30px 'Noto Sans SC', sans-serif", '#9FB8A8');
      const champ = st.winners[104];
      ct('冠 军 预 测', 350, "700 30px 'Noto Sans SC', sans-serif", '#8B8770');
      if (champ && this.TEAMS[champ]) {
        ct(this.TEAMS[champ][1], 510, '140px sans-serif', '#191D17');
        ct(this.TEAMS[champ][0], 640, "900 80px 'Noto Sans SC', sans-serif", '#191D17');
      } else {
        ct('?', 530, "900 160px 'Barlow', sans-serif", '#C9C2AA');
        ct('尚未选出 · 去「对阵」页点选', 630, "500 32px 'Noto Sans SC', sans-serif", '#8B8770');
      }
      ctx.strokeStyle = '#D5CEB8'; ctx.lineWidth = 2;
      ctx.beginPath(); ctx.moveTo(80, 700); ctx.lineTo(W - 80, 700); ctx.stroke();
      const fa = this.resolveSide(st, this.KOMAP[104], 'a'), fb = this.resolveSide(st, this.KOMAP[104], 'b');
      ct('决赛 · 7/19 纽约 MetLife', 760, "600 28px 'Noto Sans SC', sans-serif", '#8B8770');
      ct((fa ? this.T(fa) : '待定') + '   vs   ' + (fb ? this.T(fb) : '待定'), 820, "700 44px 'Noto Sans SC', sans-serif", '#191D17');
      const semis = [];
      [101,102].forEach(no => ['a','b'].forEach(sd => { const t = this.resolveSide(st, this.KOMAP[no], sd); if (t) semis.push(this.T(t)); }));
      ct('四强', 910, "600 28px 'Noto Sans SC', sans-serif", '#8B8770');
      ct(semis.length ? semis.join(' · ') : '待定', 962, "600 32px 'Noto Sans SC', sans-serif", '#191D17');
      ct('🇺🇸 美国队推演', 1060, "600 28px 'Noto Sans SC', sans-serif", '#8B8770');
      const steps = this.usaPath().slice(0, 4);
      steps.forEach((s2, i) => ct(s2, 1110 + i * 44, "500 27px 'Noto Sans SC', sans-serif", '#3D443C'));
      band(H - 14);
      ctx.fillStyle = '#6F6856'; ctx.font = "500 22px 'Noto Sans SC', sans-serif"; ctx.textAlign = 'center';
      ctx.fillText('世界杯 2026 观赛手册 · 自制预测 · 仅供娱乐', W/2, H - 40);
      this._shareCanvas = c;
      this.setState({ shareImg: c.toDataURL('image/png') });
    };
    if (document.fonts && document.fonts.ready) document.fonts.ready.then(draw); else draw();
  }

  saveShare(){
    const c = this._shareCanvas; if (!c) return;
    c.toBlob((blob) => {
      if (!blob) return;
      const file = new File([blob], '世界杯2026-我的预测.png', { type: 'image/png' });
      if (navigator.canShare && navigator.canShare({ files: [file] })) {
        navigator.share({ files: [file], title: '世界杯 2026 · 我的预测' }).catch(() => {});
      } else {
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a'); a.href = url; a.download = file.name;
        document.body.appendChild(a); a.click(); a.remove();
        setTimeout(() => URL.revokeObjectURL(url), 2000);
      }
    }, 'image/png');
  }

  /* ---------- renderVals ---------- */
  renderVals(){
    const st = this.state;
    const vals = {
      goSched: () => this.setState({ tab: 'sched' }),
      goGrp: () => this.setState({ tab: 'grp' }),
      goKo: () => this.setState({ tab: 'ko' }),
      goShare: () => this.setState({ tab: 'share' }),
      showSched: st.tab === 'sched', showGrp: st.tab === 'grp',
      showKo: st.tab === 'ko', showShare: st.tab === 'share',
      tabFg: {}, tabBg: {}
    };
    ['sched','grp','ko','share'].forEach(t => {
      vals.tabFg[t] = st.tab === t ? '#191D17' : '#8B8770';
      vals.tabBg[t] = st.tab === t ? '#C8332B' : 'transparent';
    });

    /* schedule */
    vals.groupSel = st.groupSel;
    vals.onGroupSel = (e) => this.setState({ groupSel: e.target.value });
    vals.groupOpts = Object.keys(this.GROUPS).map(g => ({ v: g, label: g + ' 组' }));
    const chipDefs = [['all','全部 52 场'],['W','西部'],['C','中部'],['E','东部']];
    vals.chips = chipDefs.map(([id, label]) => {
      const on = st.filter === id;
      return { label, bg: on ? '#191D17' : '#FFFFFF', fg: on ? '#F2EEE2' : '#191D17',
        bd: on ? '#191D17' : '#D8D2BE', onClick: () => this.setState({ filter: id }) };
    });
    const list = this.GM.filter(m => {
      const v = this.VEN[m[5]];
      if (st.groupSel && m[2] !== st.groupSel) return false;
      if (st.filter === 'W') return v[2] === 'W';
      if (st.filter === 'C') return v[2] === 'C';
      if (st.filter === 'E') return v[2] === 'E';
      return true;
    });
    const days = [];
    list.forEach(mm => {
      const [no, d, g, t1, t2, vk] = mm;
      const V = this.VEN[vk], ds = this.dayState(d);
      let day = days[days.length - 1];
      if (!day || day.d !== d) {
        const x = new Date(d + 'T12:00:00');
        day = { d, dnum: (x.getMonth()+1) + '.' + x.getDate(), wd: this.fmtW(d), matches: [] };
        days.push(day);
      }
      const tags = [{ t: g + ' 组', bg: '#E7EEF8', fg: '#2A4E8C' }];
      if (ds === 0) tags.push({ t: '今天', bg: '#191D17', fg: '#FFFFFF' });
      if (ds === -1) tags.push({ t: '已结束', bg: '#E2DECE', fg: '#6F6856' });
      tags.push({ t: 'M' + no, bg: '#ECE7D6', fg: '#8B8770' });
      const railC = { W: '#1D5FBF', C: '#0E8C4F', E: '#C8332B' }[V[2]];
      const o = st.odds[no];
      let odds = null;
      if (o) {
        const tot = o.p1 + o.pd + o.p2;
        if (tot > 0.5) {
          const q1 = Math.round(o.p1 / tot * 100), qd = Math.round(o.pd / tot * 100);
          odds = { q1, qd, q2: Math.max(0, 100 - q1 - qd),
            n1: this.TEAMS[t1][0], n2: this.TEAMS[t2][0],
            src: o.closed ? '已收盘' : (o.live ? '🔴 直播中 · Polymarket' : 'Polymarket 实时') };
        }
      } else if (ODDS_SLUGS[no]) {
        odds = { loading: true };
      }
      day.matches.push({
        t1: this.T(t1), t2: this.T(t2),
        ven: V[0], city: V[1],
        bg: '#FFFFFF', bd: '#DCD6C2',
        rail: railC, tags, odds
      });
    });
    days.forEach(day => { day.count = day.matches.length; });
    vals.schedDays = days;
    vals.schedEmpty = list.length === 0;

    /* groups */
    const doneCount = Object.keys(this.GROUPS).filter(g => (st.rank[g] || []).length >= 3).length;
    vals.grpDoneLabel = String(doneCount);
    vals.onResetGroups = () => { if (confirm('清空所有小组排名?(受影响的淘汰赛推演也会被清掉)')) this.commit({ rank: {} }); };
    vals.groupCards = Object.keys(this.GROUPS).map(g => {
      const arr = st.rank[g] || [];
      const complete = arr.length >= 3;
      const teams = this.GROUPS[g].map(t => {
        const idx = arr.indexOf(t);
        const implied4 = idx < 0 && arr.length >= 3;
        let chipBg = 'transparent', chipFg = '#857E68', chipBd = '1.5px dashed #C9C2AA', note = '', noteFg = '#6F6856', fg = '#191D17', bg = '#FFFFFF';
        if (idx === 0) { chipBg = '#0E8C4F'; chipFg = '#FFFFFF'; chipBd = '1.5px solid #0E8C4F'; note = '晋级 · 头名'; noteFg = '#0E8C4F'; }
        else if (idx === 1) { chipBg = '#1D5FBF'; chipFg = '#FFFFFF'; chipBd = '1.5px solid #1D5FBF'; note = '晋级'; noteFg = '#1D5FBF'; }
        else if (idx === 2) { chipBg = '#B8860B'; chipFg = '#FFFFFF'; chipBd = '1.5px solid #B8860B'; note = '最佳第3候选'; noteFg = '#8A6A0B'; }
        else if (idx === 3 || implied4) { chipBg = '#E2DECE'; chipFg = '#8B8770'; chipBd = '1.5px solid #E2DECE'; note = '出局'; fg = '#6F6856'; bg = '#FAF8F0'; }
        return {
          flag: this.TEAMS[t][1], name: this.TEAMS[t][0],
          rankNum: idx >= 0 ? String(idx + 1) : (implied4 ? '4' : '–'),
          chipBg, chipFg, chipBd, note, noteFg, fg, bg,
          onTap: () => this.tapTeam(g, t)
        };
      });
      return {
        g, teams,
        bd: complete ? '#BFD8C5' : '#DCD6C2',
        headBg: complete ? '#E6F3E9' : '#F7F4E9',
        status: complete ? '已完成 ✓' : (arr.length ? '已排 ' + arr.length + ' 队' : '点队伍排序'),
        statusFg: complete ? '#0E8C4F' : '#6F6856',
        onReset: () => this.resetGroup(g)
      };
    });

    /* bracket */
    const champ = st.winners[104];
    vals.hasChamp = !!champ;
    vals.champName = champ ? this.T(champ) : '';
    vals.onResetKO = () => { if (confirm('清空淘汰赛推演?(小组排名保留)')) this.commit({ thirds: {}, winners: {} }); };
    const roundDefs = [
      ['32 强', '6/28 – 7/3', m => m.no <= 88],
      ['16 强', '7/4 – 7/7', m => m.no >= 89 && m.no <= 96],
      ['8 强', '7/9 – 7/11', m => m.no >= 97 && m.no <= 100],
      ['半决赛', '7/14 – 7/15', m => m.no === 101 || m.no === 102],
      ['决赛', '7/18 – 7/19', m => m.no === 104 || m.no === 103]
    ];
    vals.rounds = roundDefs.map(([title, sub, f], i) => ({
      title, sub,
      matches: this.KO.filter(f).map(m => this.koCard(m, i === roundDefs.length - 1))
    }));
    vals.koJump = roundDefs.map(([title], i) => ({
      label: title,
      onClick: () => { const el = this.bracketRef.current; if (el) el.scrollTo({ left: i * 278, behavior: 'smooth' }); }
    }));

    /* champion odds board */
    vals.champRows = null;
    vals.oddsTime = st.oddsAt ? st.oddsAt.toLocaleTimeString('zh-CN', { hour: '2-digit', minute: '2-digit' }) : '';
    if (st.champ && st.champ.length) {
      const maxP = st.champ[0].p || 1;
      const rows = st.champ.slice(0, 8).map((c, i) => ({ ...c, rank: i + 1 }));
      if (champ) {
        const idx = st.champ.findIndex(c => NAME2CODE[c.name] === champ);
        if (idx >= 8) rows.push({ ...st.champ[idx], rank: idx + 1 });
      }
      vals.champRows = rows.map(c => {
        const code = NAME2CODE[c.name];
        const hl = !!champ && code === champ;
        return {
          rank: c.rank,
          flag: code ? this.TEAMS[code][1] : '🏳️',
          name: code ? this.TEAMS[code][0] : c.name,
          pct: (c.p * 100).toFixed(1) + '%',
          barW: Math.max(2, Math.round(c.p / maxP * 100)) + '%',
          fill: hl ? '#E8C25A' : '#0E8C4F', hl
        };
      });
    }

    /* share */
    vals.koDone = String(Object.keys(st.winners).length);
    const fa = this.resolveSide(st, this.KOMAP[104], 'a'), fb = this.resolveSide(st, this.KOMAP[104], 'b');
    vals.sumChamp = champ ? '🏆 ' + this.T(champ) : '—';
    vals.sumRunner = champ && fa && fb ? this.T(champ === fa ? fb : fa) : '—';
    const semis = [];
    [101,102].forEach(no => ['a','b'].forEach(sd => { const t = this.resolveSide(st, this.KOMAP[no], sd); if (t) semis.push(this.T(t)); }));
    vals.sumSemis = semis.length ? semis.join(' · ') : '—';
    vals.usaSteps = this.usaPath().map(t => ({ t }));
    vals.onShare = () => this.generateShare();
    vals.onSaveShare = () => this.saveShare();
    vals.shareImg = st.shareImg;
    vals.hasShareImg = !!st.shareImg;

    return vals;
  }

  render(){
    const vals = this.renderVals();
    return html`
<div data-screen-label="页头" style="position:relative;overflow:hidden;background:#142019;color:#F4F0E4;padding:calc(22px + env(safe-area-inset-top)) calc(18px + env(safe-area-inset-right)) 18px calc(18px + env(safe-area-inset-left))">
  <span style="position:absolute;right:-12px;top:-40px;font-family:'Anton',sans-serif;font-size:190px;line-height:1;color:rgba(244,240,228,.07);letter-spacing:-6px;pointer-events:none">26</span>
  <div style="display:flex;gap:8px;align-items:center;font-size:11px;letter-spacing:2.5px;color:#9FB8A8;font-weight:600;font-family:'Barlow',sans-serif">
    <span>JUN 11 — JUL 19</span><span style="width:4px;height:4px;border-radius:50%;background:#C8332B"></span><span>美国境内场次</span>
  </div>
  <div style="margin-top:9px;font-family:'Barlow Condensed','Noto Sans SC',sans-serif;font-weight:700;font-size:clamp(32px,7vw,46px);line-height:1.05;letter-spacing:.5px">世界杯 <span style="font-family:'Anton',sans-serif;color:#E8C25A;letter-spacing:1px">2026</span> 观赛手册</div>
  <div style="margin-top:8px;font-size:12.5px;color:#B9C4B6">小组赛仅列美国 52 场 · 排小组名次 → 点选推演晋级 · 自动保存</div>
</div>
<div style="height:5px;display:flex"><i style="flex:1;background:#C8332B"></i><i style="flex:1;background:#0E8C4F"></i><i style="flex:1;background:#1D5FBF"></i></div>

<nav style="position:sticky;top:0;z-index:50;display:flex;background:rgba(242,238,226,.96);backdrop-filter:blur(8px);border-bottom:1px solid #DCD6C2">
  ${[['sched','赛程',vals.goSched],['grp','小组',vals.goGrp],['ko','对阵',vals.goKo],['share','分享',vals.goShare]].map(([t, lb, go]) => html`
  <button onClick=${go} style=${`flex:1;padding:13px 4px 8px;background:none;border:none;cursor:pointer;font-family:'Barlow Condensed','Noto Sans SC',sans-serif;font-size:19px;font-weight:600;letter-spacing:2px;color:${vals.tabFg[t]}`}>${lb}<div style=${`height:3px;width:30px;border-radius:2px;margin:6px auto 0;background:${vals.tabBg[t]}`}></div></button>`)}
</nav>

<main style="min-height:60vh">

${vals.showSched && html`
<section style="max-width:780px;margin:0 auto;padding:16px 14px 10px;animation:fadeup .25s ease">
  <div style="font-size:12.5px;color:#6B7263;background:#E9E4D2;border-radius:10px;padding:10px 13px;margin-bottom:14px;line-height:1.55">小组赛美国境内共 <b style="color:#191D17">52 场</b>(不含加/墨场次)。每场下方的<b style="color:#191D17">胜率条来自 Polymarket 预测市场</b>,实时自动更新。</div>
  <div style="display:flex;gap:7px;overflow-x:auto;padding-bottom:10px;-webkit-overflow-scrolling:touch">
    ${vals.chips.map(c => html`
      <button class="pressable" onClick=${c.onClick} style=${`flex:none;padding:7px 14px;border-radius:999px;border:1px solid ${c.bd};background:${c.bg};color:${c.fg};font-size:13px;font-weight:600;cursor:pointer;font-family:inherit;transition:all .15s`}>${c.label}</button>`)}
    <select onChange=${vals.onGroupSel} value=${vals.groupSel} style="flex:none;padding:7px 12px;border-radius:999px;border:1px solid #D8D2BE;background:#FFFFFF;font-size:13px;font-family:inherit;color:#191D17">
      <option value="">按小组…</option>
      ${vals.groupOpts.map(o => html`<option value=${o.v}>${o.label}</option>`)}
    </select>
  </div>
  ${vals.schedDays.map(day => html`
    <div style="display:flex;align-items:baseline;gap:9px;margin:20px 2px 9px">
      <span style="font-family:'Anton',sans-serif;font-size:30px;letter-spacing:1px;color:#191D17">${day.dnum}</span>
      <span style="font-family:'Barlow Condensed','Noto Sans SC',sans-serif;font-size:17px;font-weight:600;color:#6B7263">${day.wd}</span>
      <span style="font-size:12px;color:#6F6856">${day.count} 场</span>
      <span style="flex:1;height:1px;background:#DCD6C2"></span>
    </div>
    ${day.matches.map(m => html`
      <div style=${`display:flex;background:${m.bg};border:1px solid ${m.bd};border-radius:11px;margin-bottom:8px;overflow:hidden`}>
        <div style=${`width:5px;flex:none;background:${m.rail}`}></div>
        <div style="flex:1;padding:10px 13px">
          <div style="font-size:16.5px;font-weight:700;display:flex;align-items:center;gap:7px;flex-wrap:wrap"><span>${m.t1}</span><span style="font-size:10.5px;font-weight:700;color:#857E68;letter-spacing:1px">VS</span><span>${m.t2}</span></div>
          <div style="font-size:12.5px;color:#6B7263;margin-top:4px">📍 <b style="color:#191D17;font-weight:600">${m.ven}</b> · ${m.city}</div>
          <div style="margin-top:7px;display:flex;gap:5px;flex-wrap:wrap">
            ${m.tags.map(tg => html`<span style=${`font-size:10.5px;font-weight:700;letter-spacing:.6px;padding:2.5px 8px;border-radius:5px;background:${tg.bg};color:${tg.fg}`}>${tg.t}</span>`)}
          </div>
          ${m.odds && (m.odds.loading ? html`
          <div style="margin-top:9px;padding-top:8px;border-top:1px dashed #E0DAC6">
            <div style="font-size:10.5px;color:#6F6856;margin-bottom:4px">加载赔率…</div>
            <div style="height:7px;border-radius:4px;background:#EAE5D5"></div>
          </div>` : html`
          <div style="margin-top:9px;padding-top:8px;border-top:1px dashed #E0DAC6">
            <div style="display:flex;justify-content:space-between;align-items:baseline;font-size:11.5px;font-weight:700;margin-bottom:4px">
              <span style="color:#1D5FBF">${m.odds.n1} 胜 ${m.odds.q1}%</span>
              <span style="color:#6F6856;font-weight:500;font-size:10.5px">平 ${m.odds.qd}% · ${m.odds.src}</span>
              <span style="color:#C8332B">${m.odds.n2} 胜 ${m.odds.q2}%</span>
            </div>
            <div style="display:flex;height:7px;border-radius:4px;overflow:hidden;gap:2px">
              <i style=${`width:${m.odds.q1}%;background:#1D5FBF`}></i>
              <i style=${`width:${m.odds.qd}%;background:#C2B79A`}></i>
              <i style=${`width:${m.odds.q2}%;background:#C8332B`}></i>
            </div>
          </div>`)}
        </div>
      </div>`)}
  `)}
  ${vals.schedEmpty && html`<div style="font-size:13px;color:#6B7263;background:#E9E4D2;border-radius:10px;padding:12px 14px">该筛选下没有比赛。</div>`}
</section>`}

${vals.showGrp && html`
<section style="max-width:1020px;margin:0 auto;padding:16px 14px 10px;animation:fadeup .25s ease">
  <div style="font-size:12.5px;color:#6B7263;background:#E9E4D2;border-radius:10px;padding:10px 13px;line-height:1.55">按你心中的名次<b style="color:#191D17">依次点击球队</b>:第 1 次点 = 第 1 名,以此类推;再点一次取消。排出前 3 即算完成 —— <b style="color:#0E8C4F">前 2 名直接晋级</b>,<b style="color:#8A6A0B">第 3 名进入「最佳第 3」候选</b>(在对阵图里分槽位)。</div>
  <div style="display:flex;align-items:center;gap:10px;margin:14px 2px 12px">
    <span style="font-family:'Anton',sans-serif;font-size:26px">${vals.grpDoneLabel}</span>
    <span style="font-size:12.5px;color:#6B7263">个小组已完成</span>
    <span style="flex:1"></span>
    <button onClick=${vals.onResetGroups} style="padding:6px 12px;border-radius:8px;border:1px solid #E3C7C2;background:#FFFFFF;color:#A23227;font-size:12.5px;cursor:pointer;font-family:inherit">清空小组排名</button>
  </div>
  <div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(270px,1fr));gap:10px">
    ${vals.groupCards.map(gc => html`
      <div style=${`background:#FFFFFF;border:1px solid ${gc.bd};border-radius:12px;overflow:hidden`}>
        <div style=${`display:flex;align-items:center;gap:8px;padding:9px 12px;background:${gc.headBg}`}>
          <span style="font-family:'Anton',sans-serif;font-size:19px;letter-spacing:1px">${gc.g}</span>
          <span style="font-family:'Barlow Condensed','Noto Sans SC',sans-serif;font-size:15px;font-weight:600;color:#6B7263">组</span>
          <span style=${`font-size:11.5px;font-weight:600;color:${gc.statusFg}`}>${gc.status}</span>
          <span style="flex:1"></span>
          <button onClick=${gc.onReset} style="padding:3px 9px;border-radius:6px;border:1px solid #DCD6C2;background:#FFFFFF;color:#8B8770;font-size:11px;cursor:pointer;font-family:inherit">重置</button>
        </div>
        ${gc.teams.map(t => html`
          <button class="rowtap" onClick=${t.onTap} style=${`display:flex;align-items:center;gap:10px;width:100%;padding:9px 12px;border:none;border-top:1px solid #EFEADB;background:${t.bg};cursor:pointer;text-align:left;font-family:inherit;transition:background .15s`}>
            <span style=${`width:26px;height:26px;flex:none;border-radius:50%;display:flex;align-items:center;justify-content:center;font-family:'Anton',sans-serif;font-size:13.5px;background:${t.chipBg};color:${t.chipFg};border:${t.chipBd}`}>${t.rankNum}</span>
            <span style="font-size:19px">${t.flag}</span>
            <span style=${`flex:1;font-size:15px;font-weight:600;color:${t.fg}`}>${t.name}</span>
            <span style=${`font-size:11px;font-weight:600;color:${t.noteFg}`}>${t.note}</span>
          </button>`)}
      </div>`)}
  </div>
</section>`}

${vals.showKo && html`
<section style="padding:16px 0 10px;animation:fadeup .25s ease">
  <div style="max-width:780px;margin:0 auto;padding:0 14px">
    ${vals.hasChamp && html`
      <div style="background:linear-gradient(135deg,#14261E,#0E1B15);color:#F4F0E4;border-radius:14px;padding:16px;text-align:center;margin-bottom:12px;animation:fadeup .3s ease">
        <div style="font-size:11px;letter-spacing:3px;color:#9FB8A8">你的冠军预测</div>
        <div style="font-family:'Barlow Condensed','Noto Sans SC',sans-serif;font-size:32px;font-weight:700;margin-top:4px">🏆 ${vals.champName}</div>
      </div>`}
    ${vals.champRows && html`
      <div style="background:#FFFFFF;border:1px solid #DCD6C2;border-radius:14px;padding:13px 14px;margin-bottom:12px">
        <div style="display:flex;align-items:baseline;gap:8px;margin-bottom:8px;flex-wrap:wrap">
          <span style="font-family:'Barlow Condensed','Noto Sans SC',sans-serif;font-size:19px;font-weight:700">📊 实时夺冠概率</span>
          <span style="font-size:11px;color:#6F6856">Polymarket 预测市场 · 更新 ${vals.oddsTime}</span>
        </div>
        ${vals.champRows.map(r => html`
          <div style=${`display:flex;align-items:center;gap:8px;padding:4.5px 6px;border-radius:8px;${r.hl ? 'background:#FCF5DE;border:1px solid #E0C77F;' : ''}`}>
            <span style="width:18px;flex:none;font-size:11px;color:#6F6856;text-align:right;font-weight:600">${r.rank}</span>
            <span style="font-size:16px;flex:none">${r.flag}</span>
            <span style="min-width:62px;flex:none;font-size:13.5px;font-weight:600;white-space:nowrap">${r.name}</span>
            <span style="flex:1;height:8px;border-radius:4px;background:#EFEADB;overflow:hidden"><i style=${`display:block;height:100%;width:${r.barW};background:${r.fill}`}></i></span>
            <span style="width:46px;flex:none;text-align:right;font-size:12.5px;font-weight:700">${r.pct}</span>
            ${r.hl && html`<span style="flex:none;font-size:10px;font-weight:700;color:#7A5A00;background:#F4E3AC;padding:1.5px 6px;border-radius:4px">你的预测</span>`}
          </div>`)}
      </div>`}
    <div style="font-size:12.5px;color:#6B7263;background:#E9E4D2;border-radius:10px;padding:10px 13px;margin-bottom:10px;line-height:1.55">32 强名单从「小组」页的排名<b style="color:#191D17">自动带入</b>;「最佳第 3」槽位用下拉分配。<b style="color:#191D17">点球队名 = 晋级,再点一次取消</b>,结果自动带到下一轮。左右滑动看完整对阵。</div>
    <div style="font-size:12.5px;color:#1D4E8C;background:#E7EEF8;border:1px solid #C9D9EE;border-radius:10px;padding:10px 13px;margin-bottom:12px;line-height:1.55">🇺🇸 <b>美国队路线:</b>D 组第 1 → 32 强 <b>7/1 在 Levi's</b> → 16 强 7/6 西雅图 → 8 强 7/11 堪萨斯城 → 半决赛 7/15 亚特兰大 → 决赛 7/19 纽约。D 组第 2 → 7/3 达拉斯。</div>
    <div style="display:flex;gap:7px;flex-wrap:wrap;align-items:center;margin-bottom:4px">
      ${vals.koJump.map(j => html`
        <button onClick=${j.onClick} style="padding:6px 12px;border-radius:8px;border:1px solid #D8D2BE;background:#FFFFFF;font-size:12.5px;font-weight:600;cursor:pointer;font-family:inherit">${j.label}</button>`)}
      <button onClick=${vals.onResetKO} style="margin-left:auto;padding:6px 12px;border-radius:8px;border:1px solid #E3C7C2;background:#FFFFFF;color:#A23227;font-size:12.5px;cursor:pointer;font-family:inherit">清空推演</button>
    </div>
  </div>
  <div ref=${this.bracketRef} style="overflow-x:auto;padding:12px 14px 30px;-webkit-overflow-scrolling:touch">
    <div style="display:flex;gap:28px;align-items:stretch;width:max-content">
      ${vals.rounds.map(rd => html`
        <div style="width:250px;display:flex;flex-direction:column">
          <div style="display:flex;align-items:baseline;gap:8px;padding:2px 2px 10px">
            <span style="font-family:'Barlow Condensed','Noto Sans SC',sans-serif;font-size:22px;font-weight:700">${rd.title}</span>
            <span style="font-size:11.5px;color:#6F6856">${rd.sub}</span>
          </div>
          <div style="flex:1;display:flex;flex-direction:column;justify-content:space-around;gap:10px">
            ${rd.matches.map(m => html`
              <div style="position:relative">
                <div style=${`position:absolute;right:-28px;top:50%;width:28px;height:2px;background:${m.stub}`}></div>
                <div style=${`background:${m.bg};border:1px solid ${m.bd};border-radius:11px;overflow:hidden;opacity:${m.op}`}>
                  <div style="display:flex;justify-content:space-between;align-items:center;padding:6px 10px 5px;font-size:10.5px;color:#8B8770">
                    <span style="font-family:'Anton',sans-serif;font-size:13px;letter-spacing:.5px;color:#191D17">${m.mno}</span>
                    <span style="font-weight:600">${m.tagline}</span>
                  </div>
                  <div style="padding:0 10px 5px;font-size:11px;color:#8B8770;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">${m.venLine}</div>
                  ${m.sides.map(s => html`
                    ${s.isTeam && html`
                      <div onClick=${s.onClick} style=${`display:flex;align-items:center;gap:7px;padding:8px 10px;border-top:1px solid #EFEADB;cursor:${s.cursor};background:${s.bg};transition:background .15s`}>
                        <span style="font-size:16px">${s.flag}</span>
                        <span style="flex:1;font-size:14px;font-weight:600;color:#191D17;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">${s.name}</span>
                        <span style=${`font-size:10px;font-weight:700;letter-spacing:.5px;color:${s.seedFg};background:${s.seedBg};padding:1.5px 6px;border-radius:4px`}>${s.seed}</span>
                        <span style=${`font-size:11px;font-weight:700;color:${s.markFg};flex:none`}>${s.mark}</span>
                        ${s.canClear && html`<span onClick=${s.onClear} style="font-size:11px;color:#6F6856;border:1px solid #DCD6C2;border-radius:5px;padding:1px 6px;cursor:pointer;flex:none">改</span>`}
                      </div>`}
                    ${s.isEmpty && html`
                      <div onClick=${s.onClick} style=${`padding:10px;border-top:1px solid #EFEADB;font-size:12px;color:#6F6856;cursor:${s.cursor}`}>${s.label}</div>`}
                    ${s.isSelect && html`
                      <div style="padding:7px 8px;border-top:1px solid #EFEADB">
                        <select onChange=${s.onChange} style="width:100%;padding:7px 8px;border-radius:8px;border:1px solid #D8D2BE;background:#FFFFFF;font-size:13px;font-family:inherit;color:#191D17">
                          <option value="">${s.label}</option>
                          ${s.opts.map(o => html`<option value=${o.v} disabled=${o.dis}>${o.label}</option>`)}
                        </select>
                      </div>`}
                  `)}
                </div>
              </div>`)}
          </div>
        </div>`)}
    </div>
  </div>
</section>`}

${vals.showShare && html`
<section style="max-width:780px;margin:0 auto;padding:16px 14px 10px;animation:fadeup .25s ease">
  <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:10px">
    <div style="background:#FFFFFF;border:1px solid #DCD6C2;border-radius:12px;padding:13px 14px">
      <div style="font-size:11px;letter-spacing:2px;color:#8B8770;font-weight:600">小组排名</div>
      <div style="font-family:'Anton',sans-serif;font-size:30px;margin-top:3px">${vals.grpDoneLabel}<span style="font-size:15px;color:#6F6856"> /12 组</span></div>
    </div>
    <div style="background:#FFFFFF;border:1px solid #DCD6C2;border-radius:12px;padding:13px 14px">
      <div style="font-size:11px;letter-spacing:2px;color:#8B8770;font-weight:600">淘汰赛推演</div>
      <div style="font-family:'Anton',sans-serif;font-size:30px;margin-top:3px">${vals.koDone}<span style="font-size:15px;color:#6F6856"> /32 场</span></div>
    </div>
  </div>
  <div style="background:#FFFFFF;border:1px solid #DCD6C2;border-radius:12px;padding:14px;margin-bottom:10px">
    <div style="font-size:11px;letter-spacing:2px;color:#8B8770;font-weight:600;margin-bottom:9px">预测摘要</div>
    <div style="display:flex;align-items:center;gap:9px;padding:7px 0;border-top:1px solid #EFEADB"><span style="width:42px;font-size:12px;color:#8B8770;flex:none">冠军</span><span style="font-size:17px;font-weight:700">${vals.sumChamp}</span></div>
    <div style="display:flex;align-items:center;gap:9px;padding:7px 0;border-top:1px solid #EFEADB"><span style="width:42px;font-size:12px;color:#8B8770;flex:none">亚军</span><span style="font-size:15px;font-weight:600">${vals.sumRunner}</span></div>
    <div style="display:flex;align-items:center;gap:9px;padding:7px 0;border-top:1px solid #EFEADB"><span style="width:42px;font-size:12px;color:#8B8770;flex:none">四强</span><span style="font-size:14px;font-weight:500">${vals.sumSemis}</span></div>
    <div style="padding:8px 0 2px;border-top:1px solid #EFEADB">
      <div style="font-size:12px;color:#8B8770;margin-bottom:5px">🇺🇸 美国队推演</div>
      ${vals.usaSteps.map(u => html`<div style="font-size:13px;color:#3D443C;padding:2.5px 0">${u.t}</div>`)}
    </div>
  </div>
  <button class="presslight" onClick=${vals.onShare} style="width:100%;padding:15px;border:none;border-radius:12px;background:#142019;color:#F4F0E4;font-size:16px;font-weight:700;font-family:'Barlow Condensed','Noto Sans SC',sans-serif;letter-spacing:2px;cursor:pointer">生成分享图 →</button>
  ${vals.hasShareImg && html`
    <div>
      <img src=${vals.shareImg} alt="我的世界杯预测" style="width:100%;border-radius:14px;border:1px solid #DCD6C2;margin-top:12px;animation:fadeup .3s ease">
      <div style="display:flex;gap:10px;align-items:center;margin-top:10px;flex-wrap:wrap">
        <button class="presslight" onClick=${vals.onSaveShare} style="padding:11px 20px;border-radius:10px;background:#142019;border:none;color:#F4F0E4;font-size:14px;font-weight:700;cursor:pointer;font-family:inherit">保存 / 分享图片</button>
        <span style="font-size:12px;color:#8B8770">或长按上图保存</span>
      </div>
    </div>`}
</section>`}

</main>
<footer style="padding:22px 16px calc(30px + env(safe-area-inset-bottom));text-align:center;font-size:11px;color:#6F6856">开球时间以 FIFA 官网 / 官方 App 为准 · 预测自动保存在本机 · 胜率数据来自 Polymarket · 仅供娱乐 · <a href="en/" style="color:#6B7263;font-weight:600;text-decoration:none">English</a></footer>`;
  }
}

render(h(App), document.getElementById('app'));
</script>
</body>
</html>
